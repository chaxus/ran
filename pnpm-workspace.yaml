packages:
  # all packages in subdirs of packages/ and components/
  - 'packages/**'
# Force patched versions of transitively-pulled build tools (Dependabot advisories).
overrides:
  esbuild: '>=0.28.1'
  '@babel/core': '>=7.29.6'
  'vitepress>vite': '^6.4.3'
allowBuilds:
  core-js: true
  esbuild: true
  fsevents: true
  preact: true
  sharp: true
  tesseract.js: true
