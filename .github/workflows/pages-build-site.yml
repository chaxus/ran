name: pages-redirect
# 站点已迁移到 Cloudflare Pages(ran.chaxus.com)。
# 这个 workflow 不再构建完整文档站,而是往 gh-pages 发布一个「跳转器」:
# 把旧的 chaxus.github.io/ran/* 客户端跳转到 ran.chaxus.com/*(保留子路径 + canonical),
# 用于把搜索权重平滑迁到新域名。不能删除本 workflow,否则 gh-pages 会冻结在旧站,
# 与新站形成重复内容。
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate redirect stub
        run: |
          mkdir -p redirect
          cat > redirect/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="robots" content="noindex, follow">
          <title>Moved to ran.chaxus.com</title>
          <script>
            // 把 /ran/<path> 跳到 https://ran.chaxus.com/<path>,保留 query/hash
            (function () {
              var rest = location.pathname.replace(/^\/ran(?=\/|$)/, '');
              var dest = 'https://ran.chaxus.com' + rest + location.search + location.hash;
              var link = document.createElement('link');
              link.rel = 'canonical';
              link.href = dest;
              document.head.appendChild(link);
              location.replace(dest);
            })();
          </script>
          <meta http-equiv="refresh" content="0; url=https://ran.chaxus.com/">
          </head>
          <body>
          This site has moved to <a href="https://ran.chaxus.com/">ran.chaxus.com</a>.
          </body>
          </html>
          HTML
          cp redirect/index.html redirect/404.html

      - name: Deploy redirect to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.RAN_ACTIONS_TOKEN }}
          publish_dir: redirect
