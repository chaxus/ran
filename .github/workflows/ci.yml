name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
  push:
    branches: [main]
    paths:
      - "packages/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    if: github.repository == 'chaxus/ran'
    runs-on: ubuntu-latest
    name: "Lint & Type-check"
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run lint:prettier

      - name: Lint
        run: pnpm run lint

  build-test:
    if: github.repository == 'chaxus/ran'
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [24, 26]
        include:
          - os: macos-latest
            node_version: 26
          - os: windows-latest
            node_version: 26
      fail-fast: false
    name: "Build&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
